spring:
  main:
    allow-circular-references: true
  servlet:
    multipart:
      # 单个文件最大大小
      max-file-size: 20MB
      # 整个请求最大大小（多文件场景含表单字段）
      max-request-size: 50MB
  datasource:
    dynamic:
      p6spy: false
      lazy: true
      druid:
        initial-size: 5
        max-active: 8
        min-idle: 3
        max-wait: 1000
        validation-query: 'select 1 from dual'
      #primary默认读取master命名的,只要不乱取名即可
      datasource:
        master:
          driver-class-name: com.mysql.jdbc.Driver
          username: wechat
          password: fk6258077
          url: jdbc:mysql://180.76.119.15:3306/wechat?serverTimezone=GMT%2B8&useUnicode=true&characterEncoding=UTF-8&allowPublicKeyRetrieval=true&useSSL=false&autoReconnect=true&failOverReadOnly=false&maxReconnects=10&allowMultiQueries=true
        slave:
          driver-class-name: com.mysql.jdbc.Driver
          username: wechat
          password: fk6258077
          url: jdbc:mysql://180.76.119.15:3306/wechat?serverTimezone=GMT%2B8&useUnicode=true&characterEncoding=UTF-8&allowPublicKeyRetrieval=true&useSSL=false&autoReconnect=true&failOverReadOnly=false&maxReconnects=10&allowMultiQueries=true
  jersey:
